  <path d="M750,140 L780,130 L820,128 L860,125 L900,128 L930,138 L950,155 L965,180 L975,210 L985,245 L995,285 L1000,320 L1005,355 L1000,385 L990,405 L975,420 L955,430 L935,445 L915,455 L895,462 L875,465 L855,462 L835,455 L815,445 L800,435 L790,420 L780,405 L775,385 L770,360 L768,335 L770,310 L775,285 L780,260 L790,235 L800,210 L815,185 L830,160 L750,140Z"
