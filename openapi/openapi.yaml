openapi: 3.1.0
info:
  title: Iya Oloja API
  version: 1.1.0
  summary: Open data API for Nigerian markets
  description: |
    Iya Oloja is a free JSON API for discovering markets across all 36 states of Nigeria and the FCT.
    The main read path is the `GET /api/markets` collection endpoint, which supports listing, search, and filtering.
    The API is read-only except for the contribution endpoint, which opens a GitHub pull request for review.
servers:
  - url: https://iya-oloja.pages.dev
    description: Production
tags:
  - name: Core
  - name: States
  - name: LGAs
  - name: Markets
  - name: Coverage
  - name: Contributions
paths:
  /api:
    get:
      tags:
        - Core
      summary: Get the API index
      description: |
        Returns high-level metadata plus a discovery object with the primary public endpoints.
        Use this as a lightweight entrypoint when you want to inspect the current API surface.
      operationId: getApiIndex
      responses:
        "200":
          description: High-level API metadata and endpoint discovery
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiIndexResponse"
              example:
                name: Iya Oloja
                description: An open directory and API for markets across Nigeria
                version: 1.1.0
                endpoints:
                  states: /api/states
                  state: /api/states/:slug
                  lgas: /api/lgas?state=:slug
                  lga: /api/lgas/:slug
                  markets: /api/markets?state=lagos&limit=20&offset=0&order=asc
                  coverage: /api/coverage
                  contribute: POST /api/contribute
                docs: /docs
                github: https://github.com/ifihan/nigerian-markets-api
  /api/states:
    get:
      tags:
        - States
      summary: List all states
      description: |
        Returns all 36 states and the FCT. This endpoint is intentionally lightweight and useful for populating
        dropdowns, filters, and lookup tables in clients.
      operationId: listStates
      responses:
        "200":
          description: A list of all Nigerian states and the FCT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatesResponse"
              example:
                success: true
                data:
                  - id: 1
                    name: Abia
                    slug: abia
                  - id: 25
                    name: Lagos
                    slug: lagos
  /api/states/{state}:
    get:
      tags:
        - States
      summary: Get a state by slug
      description: |
        Returns state metadata. Keep this endpoint for state detail and hierarchy.
        Use `GET /api/markets?state={state}` when you want the markets in a state.
        Clients may optionally request child LGAs with `include=lgas`.
      operationId: getStateBySlug
      parameters:
        - name: state
          in: path
          required: true
          description: State slug
          schema:
            type: string
          example: lagos
        - name: include
          in: query
          required: false
          description: Include child resources in the response.
          schema:
            type: string
            enum:
              - lgas
      responses:
        "200":
          description: State detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StateDetailResponse"
              example:
                success: true
                data:
                  id: 25
                  name: Lagos
                  slug: lagos
                  lga_count: 20
                  market_count: 48
                  lgas:
                    - id: 100
                      state_id: 25
                      name: Eti-Osa
                      slug: lagos-eti-osa
                    - id: 101
                      state_id: 25
                      name: Lagos Island
                      slug: lagos-lagos-island
        "404":
          description: The state slug does not exist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                error:
                  message: State not found
                  code: NOT_FOUND
  /api/lgas:
    get:
      tags:
        - LGAs
      summary: List LGAs
      description: |
        Returns LGAs. Most clients should provide a state slug so the response stays focused:
        `GET /api/lgas?state=lagos`.
      operationId: listLgas
      parameters:
        - name: state
          in: query
          required: false
          description: Filter LGAs by parent state slug.
          schema:
            type: string
          example: lagos
      responses:
        "200":
          description: A list of LGAs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LgasResponse"
              example:
                success: true
                data:
                  - id: 100
                    state_id: 25
                    name: Eti-Osa
                    slug: lagos-eti-osa
                    market_count: 8
                  - id: 101
                    state_id: 25
                    name: Lagos Island
                    slug: lagos-lagos-island
                    market_count: 12
  /api/lgas/{lga}:
    get:
      tags:
        - LGAs
      summary: Get an LGA by slug
      description: |
        Returns LGA metadata plus the parent state. By default this endpoint stays lightweight.
        Use `GET /api/markets?lga={lga}` for the markets in an LGA, or request `include=markets` when you explicitly want the embedded collection.
      operationId: getLgaBySlug
      parameters:
        - name: lga
          in: path
          required: true
          description: LGA slug
          schema:
            type: string
          example: lagos-eti-osa
        - name: include
          in: query
          required: false
          description: Include child resources in the response.
          schema:
            type: string
            enum:
              - markets
      responses:
        "200":
          description: LGA detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LgaDetailResponse"
              example:
                success: true
                data:
                  id: 100
                  state_id: 25
                  name: Eti-Osa
                  slug: lagos-eti-osa
                  market_count: 8
                  state:
                    id: 25
                    name: Lagos
                    slug: lagos
        "404":
          description: The LGA slug does not exist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                error:
                  message: LGA not found
                  code: NOT_FOUND
  /api/markets:
    get:
      tags:
        - Markets
      summary: List, search, and filter markets
      description: |
        This is the main collection endpoint for market discovery.
        Use it to paginate the full market directory, run free-text search with `q`,
        or filter by `state` and `lga`.
      operationId: listMarkets
      parameters:
        - name: q
          in: query
          required: false
          description: Free-text search across market, LGA, and state names.
          schema:
            type: string
            minLength: 1
            maxLength: 100
          example: balogun
        - name: state
          in: query
          required: false
          description: Filter markets by state slug.
          schema:
            type: string
          example: lagos
        - name: lga
          in: query
          required: false
          description: Filter markets by LGA slug.
          schema:
            type: string
          example: lagos-eti-osa
        - name: limit
          in: query
          required: false
          description: Number of results to return. Values are clamped to the 1-100 range.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          required: false
          description: Number of results to skip.
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: order
          in: query
          required: false
          description: Sort order by market name.
          schema:
            type: string
            enum:
              - asc
              - desc
            default: asc
      responses:
        "200":
          description: Paginated market results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketsResponse"
              examples:
                listAll:
                  summary: List markets
                  value:
                    success: true
                    data:
                      - id: 1
                        lga_id: 100
                        name: Ajah Market, Eti-Osa
                        slug: ajah-market
                        lat: 6.4698
                        lng: 3.5986
                        lga_name: Eti-Osa
                        lga_slug: lagos-eti-osa
                        state_name: Lagos
                        state_slug: lagos
                    meta:
                      total: 400
                      limit: 20
                      offset: 0
                filterByState:
                  summary: Markets in one state
                  value:
                    success: true
                    data:
                      - id: 1
                        lga_id: 100
                        name: Lekki Market, Eti-Osa
                        slug: lekki-market
                        lat: 6.4698
                        lng: 3.5852
                        lga_name: Eti-Osa
                        lga_slug: lagos-eti-osa
                        state_name: Lagos
                        state_slug: lagos
                    meta:
                      total: 48
                      limit: 20
                      offset: 0
        "400":
          description: One or more query parameters are invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/coverage:
    get:
      tags:
        - Coverage
      summary: Get coverage summary data
      description: |
        Returns aggregated coverage metrics for dashboards, maps, and overview screens.
        This is the endpoint the homepage-style market pulse should use instead of re-assembling totals client-side.
      operationId: getCoverage
      responses:
        "200":
          description: Coverage totals and state-level summary rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoverageResponse"
              example:
                success: true
                data:
                  total_markets: 246
                  total_states: 37
                  states_with_markets: 15
                  lgas_with_markets: 65
                  state_stats:
                    - slug: lagos
                      name: Lagos
                      market_count: 48
                      lga_with_markets: 12
                    - slug: kano
                      name: Kano
                      market_count: 37
                      lga_with_markets: 8
  /api/contribute:
    post:
      tags:
        - Contributions
      summary: Submit a market for review
      description: |
        Validates a market submission and opens a GitHub pull request against the repository for maintainer review.
        This endpoint is the API equivalent of the public contribution form.
      operationId: createContribution
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContributionRequest"
            example:
              market_name: Balogun Market, Lagos Island
              state: Lagos
              lga: Lagos Island
              lat: 6.4541
              lng: 3.3947
              contributor_name: your-github-username
      responses:
        "201":
          description: Submission accepted and a pull request has been created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContributionResponse"
              example:
                success: true
                data:
                  pr_url: https://github.com/ifihan/nigerian-markets-api/pull/42
                  message: Pull request created! It will be reviewed and merged shortly.
        "400":
          description: Missing required fields or invalid market data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                error:
                  message: market_name, state, and lga are required
                  code: BAD_REQUEST
        "409":
          description: A duplicate market slug or market already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: GitHub pull request creation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: GitHub submission service is unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    ApiIndexResponse:
      type: object
      required:
        - name
        - description
        - version
        - endpoints
        - docs
        - github
      properties:
        name:
          type: string
        description:
          type: string
        version:
          type: string
        endpoints:
          type: object
          additionalProperties:
            type: string
        docs:
          type: string
        github:
          type: string
    State:
      type: object
      required:
        - id
        - name
        - slug
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
    Lga:
      type: object
      required:
        - id
        - state_id
        - name
        - slug
      properties:
        id:
          type: integer
        state_id:
          type: integer
        name:
          type: string
        slug:
          type: string
    Market:
      type: object
      required:
        - id
        - lga_id
        - name
        - slug
        - lat
        - lng
      properties:
        id:
          type: integer
        lga_id:
          type: integer
        name:
          type: string
        slug:
          type: string
        lat:
          type:
            - number
            - "null"
        lng:
          type:
            - number
            - "null"
    MarketSearchResult:
      allOf:
        - $ref: "#/components/schemas/Market"
        - type: object
          required:
            - lga_name
            - lga_slug
            - state_name
            - state_slug
          properties:
            lga_name:
              type: string
            lga_slug:
              type: string
            state_name:
              type: string
            state_slug:
              type: string
    StateDetail:
      allOf:
        - $ref: "#/components/schemas/State"
        - type: object
          properties:
            lga_count:
              type: integer
            market_count:
              type: integer
            lgas:
              type: array
              items:
                $ref: "#/components/schemas/Lga"
    LgaSummary:
      allOf:
        - $ref: "#/components/schemas/Lga"
        - type: object
          properties:
            market_count:
              type: integer
    LgaDetail:
      allOf:
        - $ref: "#/components/schemas/LgaSummary"
        - type: object
          required:
            - state
          properties:
            state:
              $ref: "#/components/schemas/State"
            markets:
              type: array
              items:
                $ref: "#/components/schemas/Market"
    CoverageStateStat:
      type: object
      required:
        - slug
        - name
        - market_count
        - lga_with_markets
      properties:
        slug:
          type: string
        name:
          type: string
        market_count:
          type: integer
        lga_with_markets:
          type: integer
    StatesResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          const: true
        data:
          type: array
          items:
            $ref: "#/components/schemas/State"
    StateDetailResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          const: true
        data:
          $ref: "#/components/schemas/StateDetail"
    LgasResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          const: true
        data:
          type: array
          items:
            $ref: "#/components/schemas/LgaSummary"
    LgaDetailResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          const: true
        data:
          $ref: "#/components/schemas/LgaDetail"
    MarketsResponse:
      type: object
      required:
        - success
        - data
        - meta
      properties:
        success:
          type: boolean
          const: true
        data:
          type: array
          items:
            $ref: "#/components/schemas/MarketSearchResult"
        meta:
          $ref: "#/components/schemas/PaginationMeta"
    CoverageResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          const: true
        data:
          type: object
          required:
            - total_markets
            - total_states
            - states_with_markets
            - lgas_with_markets
            - state_stats
          properties:
            total_markets:
              type: integer
            total_states:
              type: integer
            states_with_markets:
              type: integer
            lgas_with_markets:
              type: integer
            state_stats:
              type: array
              items:
                $ref: "#/components/schemas/CoverageStateStat"
    PaginationMeta:
      type: object
      required:
        - total
        - limit
        - offset
      properties:
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
    ContributionRequest:
      type: object
      required:
        - market_name
        - state
        - lga
        - lat
        - lng
      properties:
        market_name:
          type: string
        state:
          type: string
        lga:
          type: string
        lat:
          type: number
          description: Latitude (must be within Nigeria, 3-15)
        lng:
          type: number
          description: Longitude (must be within Nigeria, 1-16)
        contributor_name:
          type: string
        description:
          type: string
    ContributionResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          const: true
        data:
          type: object
          required:
            - pr_url
            - message
          properties:
            pr_url:
              type: string
              format: uri
            message:
              type: string
    ErrorResponse:
      type: object
      required:
        - success
        - error
      properties:
        success:
          type: boolean
          const: false
        error:
          type: object
          required:
            - message
            - code
          properties:
            message:
              type: string
            code:
              type: string
