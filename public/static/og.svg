  <line x1="850" y1="310" x2="870" y2="200" stroke="rgba(52,211,153,0.1)" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Text -->
  <text x="80" y="230" fill="#ecf0ea" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" letter-spacing="-3">Iya Oloja</text>
